<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Asthma Monitoring</title>
<meta name="theme-color" content="#00c896">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Asthma">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f7fb;--card:#ffffff;--text:#16242f;--text2:#50657a;--border:#eef2f7;
  --primary:#00c896;--primary2:#00a878;--orange:#d96a1f;--purple:#7c3aed;--amber:#b88a00;--red:#d6304a;
  --font:'DM Sans',sans-serif;
}
body.dark{
  --bg:#0d1829;--card:#111f35;--text:#e8f4ff;--text2:#8ba8c4;--border:#1e3050;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .2s;}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:70px;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--font);}
.hidden{display:none!important;}
::-webkit-scrollbar{display:none;}
.btn-primary{background:var(--primary);color:white;font-weight:900;font-size:14px;padding:16px;border-radius:14px;text-align:center;letter-spacing:0.5px;}
.btn-primary:active{opacity:0.85;}
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);}
.input-field{background:var(--bg);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);border:1.5px solid var(--border);width:100%;margin-bottom:14px;}
.input-field::placeholder{color:var(--text2);}
.field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.2);}

/* ===== AUTH ===== */
#auth-screen{padding:24px;padding-top:60px;min-height:100vh;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-box{width:72px;height:72px;border-radius:20px;background:var(--primary);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,200,150,0.3);}
.app-name{font-size:20px;font-weight:900;color:var(--text);letter-spacing:1px;}
.tagline{font-size:13px;color:var(--text2);margin-top:4px;font-style:italic;}
.auth-card{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.06);}
.auth-card h2{font-size:22px;font-weight:900;margin-bottom:20px;}
.type-toggle{display:flex;border-radius:12px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:14px;}
.type-toggle button{flex:1;padding:14px;font-weight:700;color:var(--text2);background:transparent;}
.type-toggle button.active{background:var(--primary);color:white;}
.row2{display:flex;gap:10px;}
.row2>div{flex:1;}
.link-row{margin-top:16px;text-align:center;font-size:14px;color:var(--text2);}
.link-row b{color:var(--primary);font-weight:700;}
.pass-wrap{position:relative;}
.pass-toggle{position:absolute;right:14px;top:12px;color:var(--primary);font-size:12px;font-weight:700;}
.field-hint{font-size:11px;color:var(--text2);margin-top:-8px;margin-bottom:12px;}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;padding:20px 16px;padding-top:48px;gap:10px;}
.topbar h1{font-size:22px;font-weight:900;flex:1;}
.icon-btn{width:36px;height:36px;border-radius:18px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.back-btn{font-size:16px;color:var(--primary);font-weight:700;margin-right:8px;}

/* ===== TABBAR ===== */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;height:65px;padding-bottom:8px;z-index:100;}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text2);}
.tabbar button.active{color:var(--primary);}
.tabbar .tab-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
.tabbar button.active .tab-icon{background:rgba(0,200,150,0.12);}
.tabbar .tab-label{font-size:9px;font-weight:600;}
.tabbar button.active .tab-label{font-weight:800;}

/* ===== HOME ===== */
.status-banner{background:rgba(0,200,150,0.1);margin:16px;border-radius:12px;padding:10px;display:flex;align-items:center;gap:8px;}
.status-dot{width:8px;height:8px;border-radius:4px;background:var(--primary);}
.quick-actions{display:flex;justify-content:space-around;padding:0 16px;margin-bottom:16px;}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.qa-icon{width:52px;height:52px;border-radius:14px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.qa-label{font-size:11px;font-weight:600;color:var(--text2);}
.spo2-wrap{display:flex;justify-content:center;margin:8px 0;}
.spo2-circle{width:180px;height:180px;border-radius:90px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.08);position:relative;}
.spo2-ring{position:absolute;width:160px;height:160px;border-radius:80px;border:3px dashed;}
.spo2-label{font-size:11px;font-weight:700;letter-spacing:1px;}
.spo2-value{font-size:52px;font-weight:900;line-height:1;}
.spo2-hr{font-size:14px;font-weight:700;color:var(--text2);margin-top:4px;}
.risk-card{margin:16px;border-radius:16px;padding:16px;}
.risk-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.risk-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.risk-label{font-size:18px;font-weight:900;}
.vitals-row{display:flex;gap:10px;margin:0 16px 16px;}
.vital-box{flex:1;background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);}
.vital-box .vl{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;}
.vital-box .vv{font-size:26px;font-weight:900;}
.fab{position:fixed;bottom:80px;right:calc(50% - 240px + 20px);width:52px;height:52px;border-radius:26px;background:#ff5252;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(255,82,82,0.4);z-index:90;color:white;font-size:22px;font-weight:900;}
@media(max-width:480px){.fab{right:20px;}}

/* ===== SIDE MENU ===== */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;}
.menu-panel{width:260px;height:100%;background:var(--card);padding:20px;padding-top:60px;position:relative;}
.menu-item{padding:14px;border-radius:10px;font-size:15px;font-weight:600;color:var(--text);}
.menu-close{position:absolute;top:20px;right:20px;font-size:20px;color:var(--text2);}
.menu-footer{position:absolute;bottom:30px;left:20px;right:20px;}
.menu-footer .mn{font-size:12px;color:var(--text2);}
.menu-footer .mr{font-size:11px;color:var(--text2);margin-top:2px;}

/* ===== LOADING ===== */
#loading-screen{position:fixed;inset:0;background:#0d1829;display:flex;align-items:center;justify-content:center;z-index:1000;}
.loading-spin{width:36px;height:36px;border:3px solid rgba(0,200,150,0.3);border-top-color:#00c896;border-radius:50%;animation:spin .8s linear infinite;}
</style>
</head>
<body>

<div id="loading-screen"><div class="loading-spin"></div></div>
<div id="root"></div>
<div id="toast-container"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, onSnapshot, serverTimestamp, query, where, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getDatabase, ref, onValue, set, push, off, serverTimestamp as rtdbTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCVlzgY9XY6OfMBvFGJGXisf-hZ-_jMaTc",
  databaseURL: "https://asthma-monitoring-79e4e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "asthma-monitoring-79e4e",
  storageBucket: "asthma-monitoring-79e4e.firebasestorage.app",
  messagingSenderId: "587156062510",
  appId: "1:587156062510:android:367b591e704e35bd9bfabf"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const rtdb = getDatabase(app);

window._fb = { auth, db, rtdb, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged,
  collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, onSnapshot, serverTimestamp, query, where, orderBy, limit,
  ref, onValue, set, push, off, rtdbTimestamp };

window._state = {
  user: null, role: null, profile: null, theme: 'light',
  vitals: {spo2:null,hr:null,temp:null,resp:null}, alertStatus:'normal',
  simInterval: null, menuOpen:false, currentTab:'home', currentScreen:'home'
};

function showToast(msg){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
window.showToast = showToast;

function initials(name){
  if(!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
window.initials = initials;

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (u) => {
  document.getElementById('loading-screen').style.display='none';
  if(u){
    window._state.user = u;
    await checkRole(u.uid);
  }else{
    window._state.user = null;
    window._state.role = null;
    window._state.profile = null;
    renderAuth();
  }
});

async function checkRole(uid){
  try{
    const parentSnap = await getDoc(doc(db,'parents',uid));
    if(parentSnap.exists()){
      window._state.role = 'parent';
      window._state.profile = parentSnap.data();
      renderParentApp();
      return;
    }
    const patientSnap = await getDoc(doc(db,'patients',uid));
    if(patientSnap.exists()){
      window._state.role = 'patient';
      window._state.profile = patientSnap.data();
      renderPatientApp();
      return;
    }
    renderAuth();
  }catch(e){
    console.error(e);
    renderAuth();
  }
}
window.checkRole = checkRole;

// ===== AUTH SCREEN =====
function renderAuth(mode='login'){
  const root = document.getElementById('root');
  if(mode==='login'){
    root.innerHTML = `
    <div id="auth-screen">
      <div class="logo-wrap">
        <div class="logo-box"><span style="font-size:32px;color:white;font-weight:900;">+</span></div>
        <div class="app-name">ASTHMA MONITORING</div>
        <div class="tagline">Surveillez. Prevenez. Vivez.</div>
      </div>
      <div class="auth-card">
        <h2>Se connecter</h2>
        <label class="field-label">Email</label>
        <input class="input-field" id="li-email" type="email" placeholder="votre@email.com" autocomplete="email">
        <label class="field-label">Mot de passe</label>
        <div class="pass-wrap">
          <input class="input-field" id="li-pass" type="password" placeholder="........" autocomplete="current-password">
          <span class="pass-toggle" onclick="togglePass('li-pass',this)">Voir</span>
        </div>
        <button class="btn-primary" style="width:100%" id="li-btn" onclick="doLogin()">SE CONNECTER</button>
        <div class="link-row">Pas de compte ? <b onclick="renderAuth('register')">S'inscrire</b></div>
      </div>
    </div>`;
  }else{
    root.innerHTML = `
    <div id="auth-screen">
      <div style="margin-bottom:24px;">
        <div style="font-size:28px;font-weight:900;">Creer un compte</div>
        <div style="font-size:14px;color:var(--text2);margin-top:4px;">Rejoignez la communaute Asthma Monitoring</div>
      </div>
      <div class="auth-card">
        <label class="field-label">Type de compte</label>
        <div class="type-toggle" id="acc-type-toggle">
          <button class="active" data-type="patient" onclick="setAccType('patient')">Patient</button>
          <button data-type="parent" onclick="setAccType('parent')">Parent/Proche</button>
        </div>
        <div class="row2">
          <div><label class="field-label">Nom</label><input class="input-field" id="rg-name" placeholder="Essoung"></div>
          <div><label class="field-label">Prenom</label><input class="input-field" id="rg-prenom" placeholder="Ines"></div>
        </div>
        <div id="patient-fields" class="row2">
          <div><label class="field-label">Age</label><input class="input-field" id="rg-age" placeholder="25" type="number"></div>
          <div><label class="field-label">Ville</label><input class="input-field" id="rg-ville" placeholder="Yaounde"></div>
        </div>
        <label class="field-label">Email</label>
        <input class="input-field" id="rg-email" type="email" placeholder="email@gmail.com">
        <label class="field-label">Mot de passe</label>
        <div class="pass-wrap">
          <input class="input-field" id="rg-pass" type="password" placeholder="........">
          <span class="pass-toggle" onclick="togglePass('rg-pass',this)">Voir</span>
        </div>
        <div id="patient-only-fields">
          <label class="field-label">Numero d'urgence (Parent)</label>
          <input class="input-field" id="rg-phone" placeholder="683271688" type="tel">
          <div class="field-hint">Ce numero permettra a votre proche de se connecter et suivre vos donnees</div>
          <label class="field-label">Email de votre medecin</label>
          <input class="input-field" id="rg-doctor-email" type="email" placeholder="medecin@hopital.cm">
        </div>
        <div id="parent-only-fields" class="hidden">
          <label class="field-label">Votre numero de telephone</label>
          <input class="input-field" id="rg-parent-phone" placeholder="683271688" type="tel">
          <div class="field-hint">Ce numero doit correspondre au "numero d'urgence" enregistre par votre proche patient</div>
        </div>
        <button class="btn-primary" style="width:100%;margin-top:6px;" id="rg-btn" onclick="doRegister()">S'INSCRIRE</button>
        <div class="link-row">Deja un compte ? <b onclick="renderAuth('login')">Se connecter</b></div>
      </div>
    </div>`;
  }
}
window.renderAuth = renderAuth;

window._accType = 'patient';
window.setAccType = function(t){
  window._accType = t;
  document.querySelectorAll('#acc-type-toggle button').forEach(b=>b.classList.toggle('active', b.dataset.type===t));
  document.getElementById('patient-fields').classList.toggle('hidden', t!=='patient');
  document.getElementById('patient-only-fields').classList.toggle('hidden', t!=='patient');
  document.getElementById('parent-only-fields').classList.toggle('hidden', t!=='parent');
};

window.togglePass = function(id, el){
  const inp = document.getElementById(id);
  if(inp.type==='password'){inp.type='text';el.textContent='Cacher';}
  else{inp.type='password';el.textContent='Voir';}
};

window.doLogin = async function(){
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  if(!email||!pass){showToast('Remplissez tous les champs');return;}
  const btn = document.getElementById('li-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  try{
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){
    showToast(e.code==='auth/invalid-credential'?'Email ou mot de passe incorrect':'Erreur de connexion');
    btn.textContent = 'SE CONNECTER';
  }
};

window.doRegister = async function(){
  const name = document.getElementById('rg-name').value.trim();
  const prenom = document.getElementById('rg-prenom').value.trim();
  const email = document.getElementById('rg-email').value.trim();
  const pass = document.getElementById('rg-pass').value;
  if(!name||!email||!pass){showToast('Remplissez tous les champs');return;}
  if(pass.length<6){showToast('Mot de passe trop court (min 6)');return;}
  const btn = document.getElementById('rg-btn');
  btn.innerHTML = '<span class="spinner"></span>';

  if(window._accType==='patient'){
    const age = document.getElementById('rg-age').value;
    const ville = document.getElementById('rg-ville').value;
    const phone = document.getElementById('rg-phone').value;
    const doctorEmail = document.getElementById('rg-doctor-email').value;
    try{
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const p = {name:name+' '+prenom, firstName:prenom, lastName:name, age:age||'--', ville:ville||'Yaounde',
        email, phone, uid:cred.user.uid, role:'patient', severity:'Modere persistant', online:true,
        doctorEmail:doctorEmail||'', createdAt:serverTimestamp()};
      await setDoc(doc(db,'patients',cred.user.uid), p);
    }catch(e){
      showToast(e.code==='auth/email-already-in-use'?'Email deja utilise':'Erreur creation compte');
      btn.textContent = "S'INSCRIRE";
    }
  }else{
    const parentPhone = document.getElementById('rg-parent-phone').value;
    if(!parentPhone){showToast('Entrez votre numero de telephone');btn.textContent="S'INSCRIRE";return;}
    try{
      const cleanPhone = parentPhone.replace(/\s/g,'');
      const patientsSnap = await getDocs(collection(db,'patients'));
      let linkedPatient = null;
      patientsSnap.forEach(d=>{
        const data = d.data();
        if(data.phone && data.phone.replace(/\s/g,'')===cleanPhone){
          linkedPatient = {id:d.id, ...data};
        }
      });
      if(!linkedPatient){
        showToast("Aucun patient trouve avec ce numero d'urgence");
        btn.textContent = "S'INSCRIRE";
        return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const p = {name:name+' '+prenom, firstName:prenom, lastName:name, email, phone:parentPhone,
        uid:cred.user.uid, role:'parent', linkedPatientId:linkedPatient.id, linkedPatientName:linkedPatient.name,
        createdAt:serverTimestamp()};
      await setDoc(doc(db,'parents',cred.user.uid), p);
      showToast('Connecte a '+linkedPatient.name+' !');
    }catch(e){
      showToast(e.code==='auth/email-already-in-use'?'Email deja utilise':'Erreur: '+e.message);
      btn.textContent = "S'INSCRIRE";
    }
  }
};

window.doLogout = function(){
  if(confirm('Voulez-vous vous deconnecter ?')){
    if(window._state.simInterval) clearInterval(window._state.simInterval);
    signOut(auth);
  }
};

// ===== PATIENT APP SHELL =====
function renderPatientApp(){
  document.body.classList.toggle('dark', window._state.theme==='dark');
  const root = document.getElementById('root');
  root.innerHTML = `
    <div id="screen-container"></div>
    <div class="tabbar" id="tabbar">
      <button data-tab="home" onclick="switchTab('home')"><div class="tab-icon">S</div><div class="tab-label">Sante</div></button>
      <button data-tab="chat" onclick="switchTab('chat')"><div class="tab-icon">M</div><div class="tab-label">Messages</div></button>
      <button data-tab="ai" onclick="switchTab('ai')"><div class="tab-icon">IA</div><div class="tab-label">IA</div></button>
      <button data-tab="profile" onclick="switchTab('profile')"><div class="tab-icon">R</div><div class="tab-label">Reglages</div></button>
    </div>
  `;
  switchTab('home');
  startVitalsListener();
}
window.renderPatientApp = renderPatientApp;

window.switchTab = function(tab){
  window._state.currentTab = tab;
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='home') renderHomeScreen();
  if(tab==='chat') renderChatListScreen();
  if(tab==='ai') renderAIScreen();
  if(tab==='profile') renderProfileScreen();
};

function vitalsRisk(){
  const v = window._state.vitals;
  if(!v.spo2) return {label:'Inconnu', color:'#8093a3', bg:'#f0f4f8', icon:'?'};
  if(v.spo2<88) return {label:'Critique', color:'#d6304a', bg:'#fde8ec', icon:'!'};
  if(v.spo2<92) return {label:'Eleve', color:'#d96a1f', bg:'#fef3e8', icon:'!'};
  if(v.spo2<95) return {label:'Modere', color:'#b88a00', bg:'#fefbe8', icon:'~'};
  return {label:'Faible', color:'#00a878', bg:'#e8faf5', icon:'v'};
}

function renderHomeScreen(){
  const v = window._state.vitals;
  const p = window._state.profile;
  const r = vitalsRisk();
  const spo2Color = !v.spo2?'#8093a3':v.spo2<88?'#d6304a':v.spo2<92?'#d96a1f':v.spo2<95?'#b88a00':'#00c896';
  const sc = document.getElementById('screen-container');
  sc.innerHTML = `
    <div style="display:flex;align-items:center;padding:16px;padding-top:48px;gap:10px;background:var(--card);border-bottom:1px solid var(--border);">
      <button class="icon-btn" onclick="toggleMenu(true)" style="background:transparent;flex-direction:column;gap:3px;align-items:flex-start;padding-left:4px;">
        <div style="width:20px;height:2px;background:var(--text);border-radius:2px;"></div>

function handleVitalsUpdate(v, source){
  window._state.vitals = v;
  const ALERT = {spo2:{critical:88, warning:92}};
  if(v.spo2 < ALERT.spo2.critical) window._state.alertStatus = 'critical';
  else if(v.spo2 < ALERT.spo2.warning) window._state.alertStatus = 'warning';
  else window._state.alertStatus = 'normal';

  const uid = window._state.user?.uid;
  if(uid){
    set(ref(rtdb, 'patients/'+uid+'/vitals'), {...v, timestamp: Date.now(), source});
  }
  if(window._state.currentTab==='home' && window._state.currentScreen==='home'){
    renderHomeScreen();
  }
}

window.startSimulation = function(){
  if(window._state.simInterval) clearInterval(window._state.simInterval);
  window._state.deviceName = 'Simulation';
  const poll = ()=>handleVitalsUpdate({
    spo2: 94+Math.floor(Math.random()*6),
    hr: 65+Math.floor(Math.random()*30),
    temp: +(36.2+Math.random()*0.9).toFixed(1),
    resp: 13+Math.floor(Math.random()*7)
  }, 'sim');
  poll();
  window._state.simInterval = setInterval(poll, 5000);
  showToast('Simulation demarree');
  renderConnexionScreen();
};

window.connectGSM = function(){
  const url = document.getElementById('gsm-url').value;
  if(!url.startsWith('http')){showToast('URL invalide');return;}
  if(window._state.gsmInterval) clearInterval(window._state.gsmInterval);
  window._state.deviceName = 'GSM '+url;
  const poll = async()=>{
    try{
      const res = await fetch(url+'/vitals', {signal: AbortSignal.timeout(8000)});
      if(res.ok){
        const d = await res.json();
        handleVitalsUpdate({spo2:+d.spo2, hr:+(d.hr||d.heartRate), temp:+(d.temp||d.temperature), resp:+(d.resp||d.respiratoryRate)}, 'gsm');
      }
    }catch(e){ showToast('Erreur GSM: verifiez la connexion'); }
  };
  poll();
  window._state.gsmInterval = setInterval(poll, 30000);
  showToast('Connexion GSM en cours...');
  renderConnexionScreen();
};

window.disconnectDevice = function(){
  if(window._state.simInterval){clearInterval(window._state.simInterval);window._state.simInterval=null;}
  if(window._state.gsmInterval){clearInterval(window._state.gsmInterval);window._state.gsmInterval=null;}
  window._state.deviceName = null;
  showToast('Appareil deconnecte');
  renderConnexionScreen();
};

  `;

function renderChatMessages(msgs){
  const c = document.getElementById('chat-messages');
  if(!c) return;
  const uid = window._state.user.uid;
  c.innerHTML = msgs.length===0 ? '<div style="text-align:center;color:var(--text2);padding-top:40px;">Demarrez la conversation</div>' : msgs.map(m=>{
    const isMe = m.from===uid;
    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    return `
    <div style="max-width:82%;${isMe?'align-self:flex-end;':''}">
      ${!isMe?`<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:3px;">${m.fromName||''}</div>`:''}

        <div style="font-size:14px;line-height:1.4;">${m.text}</div>
        <div style="font-size:10px;margin-top:4px;text-align:right;color:${isMe?'rgba(255,255,255,0.7)':'var(--text2)'};">${time}</div>
      </div>
    </div>`;
  }).join('');
  window.scrollTo(0, document.body.scrollHeight);
}

window.sendChatMsg = async function(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  const chatId = getChatId(window._chatState.selected.id, window._chatState.selectedType);
  input.value = '';
  await push(ref(rtdb,'chats/'+chatId), {
    text, from: window._state.user.uid, fromName: window._state.profile?.name||'Patient', timestamp: Date.now()
  });
};

window.sendAIQuestion = async function(){
  const input = document.getElementById('ai-input');
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  window._aiHistory.push({role:'user', text:q});
  renderAIMessages();
  try{

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:400,
        messages:[{role:'user', content:`Tu es un assistant medical pour patients asthmatiques. Vitaux actuels: SpO2 ${v.spo2||'inconnu'}%, FC ${v.hr||'inconnu'} bpm, Temp ${v.temp||'inconnu'}C, Resp ${v.resp||'inconnu'}/min. Question du patient: ${q}. Reponds en francais, de maniere concise et bienveillante, sans jamais remplacer un avis medical professionnel.`}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || "Je n'ai pas pu repondre, reessayez.";

  }catch(e){

};

      ${alerts.length===0 ? `<div style="text-align:center;padding:60px 20px;color:var(--text2);">Aucune alerte</div>` :
        alerts.map(a=>`
        <div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:12px;border-color:${a.critical?'#d6304a40':'#d96a1f40'};">
          <div style="width:36px;height:36px;border-radius:18px;background:${a.critical?'rgba(214,48,74,0.12)':'rgba(217,106,31,0.12)'};display:flex;align-items:center;justify-content:center;font-weight:900;color:${a.critical?'#d6304a':'#d96a1f'};">!</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">SpO2 ${a.critical?'critique':'basse'}: ${a.spo2}%</div>
            <div style="font-size:12px;color:var(--text2);">${new Date(a.timestamp).toLocaleString('fr-FR')}</div>
          </div>
        </div>`).join('')}
    </div>
    <div style="height:90px;"></div>
  `;
}
window.renderParentAlertsScreen = renderParentAlertsScreen;

renderAuth();
</script>
</body>
</html>
